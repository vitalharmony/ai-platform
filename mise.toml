# harmonic-forge's own service-lifecycle-adjacent tooling (harmonic-forge#54).
#
# This is the docs/tooling-repo SUBSET of the golden-path pattern
# (templates/golden-path/mise.toml) — check + commit + gh tasks only.
# Deliberately NOT included, by design, not oversight:
#   - bump: no running artifact exists to stamp. Consumers get this repo
#     via `sync_rules.py --pull`, so the git SHA already IS the version —
#     a per-commit VERSION file would gate nothing the SHA doesn't.
#   - restart: no service exists. This is a docs/rules/tooling repo.
# harmonic-forge.md's "Draft v0.2" header is a hand-maintained spec-status
# marker, bumped deliberately at real milestones — not automated here,
# on purpose (automating it per-commit would destroy its meaning).
#
# Transaction-log rotation has no version bump to hang it on, so it's tied
# to `commit --push` instead: push is this repo's genuine "publish" event
# (per the local-commits-until-push policy), the structural analog of
# HRSE2's version bump. See scripts/git_commit.py for the implementation.

[tools]
python = "3.13.13"

[env]
GH_REPO = "vitalharmony/harmonic-forge"
GH_PROJECT_OWNER = "vitalharmony"
GH_PROJECT_NUMBER = "3"

[tasks.check]
description = "Verification gate — Python syntax check over tools/ and sync_rules.py (no test suite exists yet)"
run = """
set -e
find tools -name '*.py' -print0 | xargs -0 -n1 python3 -m py_compile
python3 -m py_compile sync_rules.py
echo "[CHECK] Syntax-clean: tools/*.py, sync_rules.py"
"""

[tasks.commit]
description = "Stage, append a transaction-log entry, and commit — in that order, one commit total"
usage = '''
flag "--message <message>" help="Override the auto-generated commit message"
flag "--push" help="Push to remote (also clears transaction-log.md, main only — see script header)"
'''
run = """
set -e
set --
[ -n "${usage_message:-}" ] && set -- "$@" "--message=${usage_message}"
[ "${usage_push:-false}" = "true" ] && set -- "$@" "--push"
python3 scripts/git_commit.py "$@"
"""

[tasks.gh-new-issue]
description = "Create a GitHub issue and add it to the harmonic-forge Backlog board (tools/gh/gh_issue.py)"
usage = '''
flag "--title <title>" help="Issue title" required=#true
flag "--body <body>" help="Issue body" default="*Created via mise gh-new-issue*"
flag "--labels <labels>" help="Comma-separated labels" default="feature"
'''
run = """
set -e
python3 tools/gh/gh_issue.py \
  --repo "$GH_REPO" \
  --title "$usage_title" \
  --body "$usage_body" \
  --labels "$usage_labels"
"""

[tasks.post-comment]
description = "Post a GitHub issue comment via --body-file with a mandatory self-check (tools/gh/post_comment.py, ADR-004/ADR-005)"
usage = '''
flag "--issue <issue>" help="Issue number" required=#true
flag "--file <file>" help="Path to a file containing the comment body" required=#true
'''
run = "python3 tools/gh/post_comment.py --repo \"$GH_REPO\" --issue \"$usage_issue\" --file \"$usage_file\""
